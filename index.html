<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DSM Afternoon Strategy</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    font-size: 13px;
    background: #0f1117;
    color: #e2e8f0;
    min-height: 100vh;
  }

  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 24px;
    background: #1a1d27;
    border-bottom: 1px solid #2d3148;
  }
  header h1 { font-size: 18px; font-weight: 600; color: #fff; letter-spacing: -.3px; }
  header h1 span { color: #6c8ebf; }

  nav { display: flex; gap: 16px; align-items: center; }
  nav a {
    color: #8892a4; text-decoration: none; font-size: 13px; font-weight: 500;
    padding: 4px 10px; border-radius: 4px; transition: all .15s;
  }
  nav a:hover { color: #e2e8f0; background: #2d3148; }
  nav a.active { color: #3b82f6; background: #1e293b; }

  /* Date nav */
  .date-nav {
    display: flex; align-items: center; gap: 12px;
    padding: 12px 24px; background: #1a1d27; border-bottom: 1px solid #2d3148;
  }
  .date-nav button {
    background: #2d3148; border: none; color: #e2e8f0; padding: 6px 12px;
    border-radius: 4px; cursor: pointer; font-size: 14px; font-weight: 600;
  }
  .date-nav button:hover { background: #3b82f6; }
  .date-nav .date-label { font-size: 15px; font-weight: 600; min-width: 140px; text-align: center; }
  .date-nav .today-btn {
    font-size: 12px; padding: 4px 10px; background: #374151; margin-left: 8px;
  }

  /* Main */
  main { padding: 16px 24px; }

  /* Table */
  .table-wrap { overflow-x: auto; }
  table {
    width: 100%; border-collapse: collapse; white-space: nowrap;
    font-size: 12px;
  }
  th {
    background: #1f2335; color: #8892a4; font-size: 10px; font-weight: 600;
    text-transform: uppercase; letter-spacing: .5px;
    padding: 8px 10px; text-align: left; border-bottom: 1px solid #2d3148;
    position: sticky; top: 0; z-index: 1;
  }
  td {
    padding: 7px 10px; border-bottom: 1px solid #1f2335;
    vertical-align: middle;
  }
  tr:hover td { background: #1a1d27; }

  /* Toggle switch */
  .toggle { position: relative; display: inline-block; width: 34px; height: 18px; }
  .toggle input { opacity: 0; width: 0; height: 0; }
  .toggle .slider {
    position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0;
    background: #374151; border-radius: 18px; transition: .2s;
  }
  .toggle .slider::before {
    content: ""; position: absolute; height: 14px; width: 14px;
    left: 2px; bottom: 2px; background: #9ca3af; border-radius: 50%; transition: .2s;
  }
  .toggle input:checked + .slider { background: #3b82f6; }
  .toggle input:checked + .slider::before { transform: translateX(16px); background: #fff; }

  /* Start time selector */
  .time-sel {
    display: inline-flex; border: 1px solid #374151; border-radius: 4px; overflow: hidden;
  }
  .time-sel button {
    background: transparent; border: none; color: #8892a4; padding: 3px 8px;
    font-size: 11px; cursor: pointer; transition: all .15s;
  }
  .time-sel button.active { background: #3b82f6; color: #fff; }

  /* Value colors */
  .positive { color: #22c55e; }
  .negative { color: #ef4444; }
  .muted { color: #6b7280; }
  .highlight { color: #f59e0b; font-weight: 600; }
  .win-high { color: #22c55e; font-weight: 600; }
  .win-med { color: #f59e0b; }
  .win-low { color: #ef4444; }

  /* Status indicator */
  .status { font-size: 11px; padding: 2px 6px; border-radius: 3px; font-weight: 500; }
  .status-waiting { background: #374151; color: #9ca3af; }
  .status-ready { background: #1e3a5f; color: #60a5fa; }
  .status-bet { background: #14532d; color: #4ade80; }
  .status-skip { background: #451a03; color: #fb923c; }
  .status-error { background: #450a0a; color: #f87171; }

  #last-update { font-size: 11px; color: #6b7280; }
</style>
</head>
<body>

<header>
  <h1>DSM <span>Afternoon Strategy</span></h1>

</div>

let viewDate = new Date();
let isToday = true;
let states = {};
let maxDateStr = formatDate(new Date());  // updated from server

function formatDate(d) {
  const y = d.getFullYear();
  const m = String(d.getMonth() + 1).padStart(2, '0');
  const day = String(d.getDate()).padStart(2, '0');
  return y + '-' + m + '-' + day;
}

function changeDate(delta) {
  viewDate.setDate(viewDate.getDate() + delta);
  const viewStr = formatDate(viewDate);
  if (viewStr > maxDateStr) {
    // Clamp to the latest local date across all cities
    const parts = maxDateStr.split('-');
    viewDate = new Date(+parts[0], +parts[1] - 1, +parts[2]);
  }
  isToday = formatDate(viewDate) === maxDateStr;
  updateDateLabel();
  fetchData();
}

function goToday() {
  const parts = maxDateStr.split('-');
  viewDate = new Date(+parts[0], +parts[1] - 1, +parts[2]);
  isToday = true;
  updateDateLabel();
  fetchData();
}

function updateDateLabel() {
  const el = document.getElementById('date-label');
  if (isToday) {
    el.textContent = 'Today (' + formatDate(viewDate) + ')';
  } else {
    el.textContent = formatDate(viewDate);
  }
  document.getElementById('btn-next').disabled = isToday;
}

function getWinProb(code, reqCutoff, requireDecl) {
  const r = WIN_RATES[code] || {};
  const cutoffRates = r[String(reqCutoff)] || {};
  if (requireDecl) return cutoffRates['declining'] || 0;
  return cutoffRates['all'] || 0;
}

function winClass(p) {
  if (p >= 0.80) return 'win-high';
  if (p >= 0.60) return 'win-med';
  return 'win-low';
}

function pct(v, digits) {
  if (v == null) return '';
  return (v * 100).toFixed(digits || 1) + '%';
}

function money(v) {
  if (v == null) return '';
  return '$' + v.toFixed(2);
}

function edgeFmt(v) {
  if (v == null) return '';
  const cls = v >= 0.05 ? 'positive' : v >= 0 ? 'muted' : 'negative';
  return '<span class="' + cls + '">' + (v * 100).toFixed(1) + '%</span>';
}

function profitFmt(v) {
  if (v == null) return '';
  const cls = v >= 0 ? 'positive' : 'negative';
  const sign = v >= 0 ? '+' : '';
  return '<span class="' + cls + '">' + sign + '$' + v.toFixed(2) + '</span>';
}

function fmtDsmTime(raw, tz) {
  // Show times in LST (= standard time, no DST adjustment)
  // Standard time zone IDs: use the fixed-offset equivalent
  if (!raw) return '';
  try {
    if (raw.includes('T')) {
      const d = new Date(raw + (raw.endsWith('Z') ? '' : 'Z'));
      // Get wall clock in the city's tz
      const wall = d.toLocaleString('en-US', {
        timeZone: tz || 'UTC',
        hour: 'numeric', minute: '2-digit', hour12: true
      });
      // Check if DST is active by comparing offsets
      const jan = new Date(d.getFullYear(), 0, 1);
      const janOff = new Date(jan.toLocaleString('en-US', {timeZone: tz})).getTime() - jan.getTime();
      const curOff = new Date(d.toLocaleString('en-US', {timeZone: tz})).getTime() - d.getTime();
      const isDST = curOff !== janOff;
      if (isDST) {
        // Subtract 1 hour for LST
        const lstDate = new Date(d.getTime() - 3600000);
        return lstDate.toLocaleString('en-US', {
          timeZone: tz,
          hour: 'numeric', minute: '2-digit', hour12: true
        }).replace(/ AM/, 'a').replace(/ PM/, 'p');
      }
      return wall.replace(/ AM/, 'a').replace(/ PM/, 'p');
    }
    return raw;
  } catch(e) { return raw; }
}

function mosDeclLabel(val) {
  if (val === true) return '<span class="positive">Yes</span>';
  if (val === false) return '<span class="negative">No</span>';
  return '<span class="muted">—</span>';
}

function statusLabel(st) {
  if (!st) return '<span class="status status-waiting">WAITING</span>';
  if (st.bet_placed) return '<span class="status status-bet">BET</span>';
  if (st.error) return '<span class="status status-skip" title="' + (st.error||'') + '">SKIP</span>';
  if (st.dsm_high != null) return '<span class="status status-ready">READY</span>';
  return '<span class="status status-waiting">WAITING</span>';
}

    return a.code.localeCompare(b.code);

  for (const c of sorted) {

    }
    const cutoffs = DSM_CUTOFFS[c.code] || [15];
    const reqCutoff = st.req_cutoff || cutoffs[0];
    const requireDecl = st.require_declining || false;
    const enabled = st.enabled !== false;
    // Avg Win% reflects the SELECTED req_cutoff (what you're configuring)
    const avgWin = getWinProb(c.code, reqCutoff, requireDecl);

    // Edge calculations
    let edgeReport = null, edgeBet = null;
    if (st.win_prob_at_report != null && st.ask_at_report != null) {
      edgeReport = st.win_prob_at_report - st.ask_at_report / 100;
    }
    if (st.win_prob_at_bet != null && st.ask_at_report != null) {
      edgeBet = st.win_prob_at_bet - st.ask_at_report / 100;
    }

    // Bucket + ask display
    let bucketAsk = '';
    if (st.bucket_range && st.ask_at_report != null) {
      bucketAsk = st.bucket_range + ' @ ' + st.ask_at_report + '\u00a2';
    }

    html += '<tr>';
    html += '<td><strong>' + c.code + '</strong></td>';
    html += '<td class="muted">' + (c.local_time || '') + '</td>';

    // Trading toggle
    html += '<td><label class="toggle"><input type="checkbox" ' +

      ' onchange="toggle(\'' + c.code + '\',\'enabled\',this.checked)">' +
      '<span class="slider"></span></label></td>';

    // Req cutoff — dynamic buttons based on available cutoffs (LST)
    const cityLabels = CUTOFF_LABELS[c.code] || {};
    html += '<td><div class="time-sel">';
    for (const h of cutoffs) {
      const label = cityLabels[h] || ((h > 12 ? (h - 12) : h) + (h >= 12 ? 'p' : 'a'));
      html += '<button class="' + (reqCutoff === h ? 'active' : '') +
        '" onclick="setCutoff(\'' + c.code + '\',' + h + ')">' + label + '</button>';
    }
    html += '</div></td>';

    // Declining only toggle
    html += '<td><label class="toggle"><input type="checkbox" ' +

      ' onchange="toggle(\'' + c.code + '\',\'require_declining\',this.checked)">' +
      '<span class="slider"></span></label></td>';

    // Avg win prob
    html += '<td class="' + winClass(avgWin) + '">' + pct(avgWin) + '</td>';

    // MOS declining
    html += '<td>' + mosDeclLabel(st.mos_declining) + '</td>';

    // DSM time, high (with effective cutoff indicator), max known
    html += '<td class="muted">' + fmtDsmTime(st.dsm_time, c.tz) + '</td>';
    let dsmHighLabel = '';
    if (st.dsm_high != null) {
      // Show the cutoff the high came from — use effective_cutoff if set, else req_cutoff
      const cutoffUsed = st.effective_cutoff || reqCutoff;
      const ecLabel = cutoffUsed > 12 ? (cutoffUsed - 12) + 'PM' : cutoffUsed + 'AM';
      dsmHighLabel = st.dsm_high + '\u00b0F (' + ecLabel + ')';
    }
    html += '<td>' + dsmHighLabel + '</td>';

    // Reliable max (from DSM/CLI/6hr METAR only)
    let reliableLabel = '';
    if (st.reliable_max != null) {
      reliableLabel = st.reliable_max + '\u00b0F';
      if (st.newest_cutoff_time) {
        // Show cutoff time in the CITY's local time (not browser TZ).
        // The ISO string already has the city's offset, so parse HH:MM directly.
        try {
          const m = st.newest_cutoff_time.match(/T(\d{2}):(\d{2})/);
          if (m) {
            let hh = parseInt(m[1]);
            const mm = m[2];
            const ampm = hh >= 12 ? 'PM' : 'AM';
            const h12 = hh > 12 ? hh - 12 : (hh === 0 ? 12 : hh);
            reliableLabel += ' (' + h12 + ':' + mm + ampm + ')';
          }
        } catch(e) {}
      }
    }
    html += '<td>' + reliableLabel + '</td>';


    // Eliminated bucket (directly below reliable_max) — shows YES ask
    // Low YES ask = market already priced it as eliminated (good)
    // High YES ask = market hasn't caught up yet (opportunity for NO bet)
    let elimLabel = '';
    if (st.elim_bucket_range && st.elim_bucket_yes_ask != null) {
      elimLabel = st.elim_bucket_range + ' YES@' + st.elim_bucket_yes_ask + '\u00a2';
    }
    html += '<td class="muted">' + elimLabel + '</td>';

    html += '<td>' + (st.wethr_high != null ? st.wethr_high + '\u00b0F' : (st.max_known != null ? st.max_known + '\u00b0F' : '')) + '</td>';

    // Edge @report, @bet
    html += '<td>' + edgeFmt(edgeReport) + '</td>';

    // Bucket + ask
    html += '<td class="muted">' + bucketAsk + '</td>';

    // Cost, Value, Profit
    html += '<td>' + (st.cost_basis != null ? money(st.cost_basis) : '') + '</td>';
    html += '<td>' + (st.current_value != null ? money(st.current_value) : '') + '</td>';
    html += '<td>' + profitFmt(st.profit) + '</td>';

    // Status
    html += '<td>' + statusLabel(st) + '</td>';
    html += '</tr>';
  }
  tbody.innerHTML = html;
}

function toggle(code, key, value) { /* read-only */ }

function setCutoff(code, hour) { /* read-only */ }

function fetchData() {
  // Always fetch live state first to get max_date and local_times
  fetch('state.json?t=' + Date.now())
    .then(r => r.json())
    .then(liveData => {
      // Update max date from server (latest local date across all city timezones)
      if (liveData.max_date) {
        maxDateStr = liveData.max_date;
        // Re-check isToday against server's max date
        isToday = formatDate(viewDate) === maxDateStr;
        updateDateLabel();
      }
      // Add local times from server
      if (liveData.local_times) {
        for (const c of CITIES) {
          if (liveData.local_times[c.code]) {
            c.local_time = liveData.local_times[c.code];
          }
        }
      }

      if (isToday) {
        states = liveData.states || {};
        renderRows();
      } else {
        // Fetch historical data for the selected date
        const dateStr = formatDate(viewDate);
        fetch('history/' + dateStr + '.json?t=' + Date.now())
          .then(r => r.json())
          .then(histData => {
            states = histData.states || {};
            renderRows();
          })
          .catch(e => console.error('History fetch error:', e));
      }
      // Show updated time in both wall clock (local) and LST
      const _now = new Date();
      const _wallStr = _now.toLocaleTimeString('en-US', {hour: 'numeric', minute: '2-digit', hour12: true});
      // Detect DST: compare Jan offset to current offset
      const _janOff = new Date(_now.getFullYear(), 0, 1).getTimezoneOffset();
      const _curOff = _now.getTimezoneOffset();
      const _isDST = _curOff < _janOff;
      let _updateStr = 'Updated: ' + _wallStr;
      if (_isDST) {
        const _lstNow = new Date(_now.getTime() + (_janOff - _curOff) * 60000);
        const _lstStr = _lstNow.toLocaleTimeString('en-US', {hour: 'numeric', minute: '2-digit', hour12: true});
        _updateStr += ' / ' + _lstStr + ' LST';
      }
      document.getElementById('last-update').textContent = _updateStr;
    })
    .catch(e => console.error('Fetch error:', e));
}

// Initial load
updateDateLabel();
fetchData();
// Auto-refresh every 30s when viewing today
setInterval(() => { if (isToday) fetchData(); }, 30000);
</script>
